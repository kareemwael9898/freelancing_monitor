name: Nafezly Project Monitor

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allow running manually from the GitHub Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      # Required to write and push state.json back to the repository
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          # Fetch all history so push doesn't fail
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Cache pip dependencies to speed up runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Monitor Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit and Push state changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add state.json
          git commit -m "Update processed projects state [skip ci]" || exit 0
          git pull --rebase
          git push
